version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sms-network

  backend:
    build: .
    container_name: sms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sms_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - sms-network

volumes:
  mysql_data:

networks:
  sms-network:
    driver: bridge
